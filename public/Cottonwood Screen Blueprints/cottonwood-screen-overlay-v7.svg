  <defs>
    <clipPath id="reveal-clip">
      <polygon points="548,598 882,508 882,508 548,598">
        <animate attributeName="points" from="548,598 882,508 882,508 548,598" to="548,104 882,189 882,508 548,598" dur="4s" fill="freeze"/>
      </polygon>
    </clipPath>
  </defs>

  <!-- Pulley mounting bracket -->
